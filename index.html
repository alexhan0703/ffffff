<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 시간표 생성기</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 { color: var(--primary); text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
        }
        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #fff;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: center;
        }
        th { background: #f1f5f9; color: #475569; }
        .subject-cell {
            background: #e0e7ff;
            color: #4338ca;
            font-weight: 600;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📅 스마트 시간표 생성기</h1>
        <div class="input-group">
            <input type="text" id="subjectInput" placeholder="과목명을 입력하세요 (예: 수학, 영어)">
            <button onclick="addSubject()">과목 추가</button>
        </div>
        <table id="timetable">
            <thead>
                <tr>
                    <th>교시</th>
                    <th>월</th>
                    <th>화</th>
                    <th>수</th>
                    <th>목</th>
                    <th>금</th>
                </tr>
            </thead>
            <tbody id="timetableBody">
                <!-- 여기에 시간표 데이터가 들어갑니다 -->
            </tbody>
        </table>
        <div style="margin-top: 20px; text-align: center;">
            <button onclick="finishTimetable()" style="background: #10b981;">시간표 완성! (폭죽)</button>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('timetableBody');
        const subjects = [];

        // 초기 시간표 틀 생성 (1~6교시)
        for (let i = 1; i <= 6; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${i}교시</td><td></td><td></td><td></td><td></td><td></td>`;
            tableBody.appendChild(row);
        }

        function addSubject() {
            const input = document.getElementById('subjectInput');
            if (!input.value) return;

            const cells = document.querySelectorAll('#timetable td:not(:first-child)');
            const emptyCells = Array.from(cells).filter(cell => cell.innerText === '');
            
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                randomCell.innerText = input.value;
                randomCell.className = 'subject-cell';
                input.value = '';
            } else {
                alert('시간표가 꽉 찼습니다!');
            }
        }

        function finishTimetable() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            alert('멋진 시간표가 완성되었습니다! 🎉');
        }
    </script>
</body>
</html>
